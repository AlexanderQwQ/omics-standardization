# =============================================================================
# omics_standardization — Conda 完整环境配置（一键创建全功能环境）
# =============================================================================
# 用法:
#   conda env create -f environment.yml
#   conda activate omics-std
#   pip install -e ".[test,dev]"
#
# 包含: Python 核心 + PyTorch + R/Bioconductor + kallisto + 全部解析器
# 不含: dmPython（需手动安装达梦 DM8 驱动）
# =============================================================================

name: omics-std
channels:
  - conda-forge
  - bioconda
  - pytorch
  - defaults

dependencies:
  # ===========================================================================
  # Python 运行时
  # ===========================================================================
  - python>=3.10,<3.14
  - pip
  - setuptools>=65

  # ===========================================================================
  # 核心依赖 (conda-forge)
  # ===========================================================================
  - anndata>=0.10
  - scanpy>=1.9
  - numpy>=1.21
  - pandas>=1.5
  - scipy>=1.9
  - scikit-learn>=1.1
  - matplotlib>=3.7
  - seaborn>=0.12
  - pyyaml>=6.0
  - tqdm
  - h5py>=3.8
  - joblib
  - numba>=0.57
  - pydantic>=2.0
  - rich

  # ===========================================================================
  # PyTorch (pytorch channel，默认含 CUDA)
  # ===========================================================================
  - pytorch::pytorch>=1.13

  # ===========================================================================
  # R 语言 + Bioconductor (rpy2 的运行时，TMM/DESeq2/VSN/Scran)
  # ===========================================================================
  - r-base>=4.0
  - rpy2>=3.5
  - bioconductor-edger
  - bioconductor-deseq2
  - bioconductor-limma
  - bioconductor-scran

  # ===========================================================================
  # 生物信息学工具 (bioconda)
  # ===========================================================================
  - pysam>=0.22
  - kallisto
  - biom-format>=2.1

  # ===========================================================================
  # 开发与测试
  # ===========================================================================
  - pytest>=7.0
  - pytest-cov
  - pytest-mock
  - ruff
  - pre-commit

  # ===========================================================================
  # 文档构建
  # ===========================================================================
  - sphinx>=6.0
  - myst-nb>=1.0
  - sphinx-book-theme>=1.0
  - nbsphinx
  - ipykernel

  # ===========================================================================
  # 仅 pip 可用的包（conda-forge 无或版本过旧）
  # ===========================================================================
  - pip:
    - muon>=0.1
    - mudata>=0.2
    - scvi-tools>=1.0
    - fcsparser>=0.2
    - pymzml>=2.5
    - magic-impute>=3.0
    - minio>=7.2
    - neo4j>=5.20
    # - dmPython>=8.0  # 取消注释前请先安装达梦 DM8 数据库客户端
